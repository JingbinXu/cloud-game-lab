name: Deploy Resume MVP

on:
  push:
    branches: [main]
    paths:
      - 'resume-mvp/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: resume-mvp/package-lock.json

      - name: Install frontend dependencies
        working-directory: resume-mvp
        run: npm ci

      - name: Build frontend
        working-directory: resume-mvp
        run: npm run build

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /home/ubuntu/resume-mvp

            # 拉取最新代码
            git pull origin main

            # 更新后端依赖
            cd resume-mvp/backend
            source venv/bin/activate
            pip install -r requirements.txt -q
            cd /home/ubuntu/resume-mvp

            # 重启后端服务
            sudo systemctl restart resume-mvp-backend

      - name: Upload frontend build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "resume-mvp/dist/*"
          target: "/var/www/resume-mvp"
          strip_components: 2

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            echo "=== 后端状态 ==="
            sudo systemctl status resume-mvp-backend --no-pager -l | head -10
            echo "=== 前端文件 ==="
            ls -la /var/www/resume-mvp/
